---
name: Update Minecraft versions

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Record start time
        id: start_time
        run: |
          START_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "timestamp=$START_TIME" >> $GITHUB_OUTPUT
          echo "start_epoch=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '18'

      - name: Run update script
        id: update
        run: |
          node scripts/update-versions.js > update-output.json
          cat update-output.json
        working-directory: ${{ github.workspace }}

      - name: Parse update output
        id: parse
        run: |
          DETECTED=$(cat update-output.json | jq -r '.detected | join(", ")')
          CHANGED=$(cat update-output.json | jq -r '.changed')
          # sanitize detected string for branch name (replace / and spaces)
          DETECTED_SANITIZED=${DETECTED//\//-}
          DETECTED_SANITIZED=${DETECTED_SANITIZED// /-}
          echo "detected=$DETECTED_SANITIZED" >> $GITHUB_OUTPUT
          echo "detected_display=$DETECTED" >> $GITHUB_OUTPUT
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      - name: Create Pull Request if changed
        if: steps.parse.outputs.changed == 'true'
        id: pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update Minecraft version list'
          branch: ver-up/${{ steps.parse.outputs.detected }}/${{ github.run_id }}
          title: 'chore: update Minecraft versions'
          body: 'Automated update of Minecraft version list from Mojang manifest'
          labels: automated

      - name: Get commit ID
        id: commit
        run: |
          COMMIT_ID=$(git rev-parse HEAD)
          echo "commit_id=$COMMIT_ID" >> $GITHUB_OUTPUT
          echo "commit_short=${COMMIT_ID:0:7}" >> $GITHUB_OUTPUT

      - name: Calculate execution time
        id: duration
        run: |
          END_EPOCH=$(date +%s)
          DURATION=$((END_EPOCH - ${{ steps.start_time.outputs.start_epoch }}))
          MINUTES=$((DURATION / 60))
          SECONDS=$((DURATION % 60))
          echo "duration_sec=$DURATION" >> $GITHUB_OUTPUT
          echo "duration_display=${MINUTES}m${SECONDS}s" >> $GITHUB_OUTPUT

      - name: Send Discord notification
        if: always()
        run: |
          if [ "${{ steps.parse.outputs.changed }}" == "true" ]; then
            STATUS_COLOR=3066993
            STATUS_TITLE="✅ バージョン更新検知"
            STATUS_DESC="新しい Minecraft バージョンが検知されました"
            PR_LINK="${{ github.server_url }}/${{ github.repository }}/pull/${{ steps.pr.outputs.pull_request_number }}"
            PR_FIELD="[PR #${{ steps.pr.outputs.pull_request_number }}]($PR_LINK)"
            DETECTED_FIELD="${{ steps.parse.outputs.detected_display }}"
          else
            STATUS_COLOR=9807270
            STATUS_TITLE="ℹ️ 更新なし"
            STATUS_DESC="新しいバージョンは検知されませんでした"
            PR_FIELD="なし"
            DETECTED_FIELD="なし"
          fi

          PAYLOAD=$(cat <<EOF
          {
            "embeds": [{
              "title": "$STATUS_TITLE",
              "description": "$STATUS_DESC",
              "color": $STATUS_COLOR,
              "fields": [
                {
                  "name": "🔍 検知バージョン",
                  "value": "$DETECTED_FIELD",
                  "inline": false
                },
                {
                  "name": "📌 Pull Request",
                  "value": "$PR_FIELD",
                  "inline": false
                },
                {
                  "name": "📝 コミット ID",
                  "value": "\`${{ steps.commit.outputs.commit_short }}\`",
                  "inline": true
                },
                {
                  "name": "⏱️ 実行時間",
                  "value": "${{ steps.duration.outputs.duration_display }}",
                  "inline": true
                },
                {
                  "name": "🎯 ワークフロー実行",
                  "value": "[${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})",
                  "inline": true
                },
                {
                  "name": "📅 実行日時",
                  "value": "${{ steps.start_time.outputs.timestamp }}",
                  "inline": false
                }
              ],
              "timestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            }]
          }
          EOF
          )

          curl -X POST \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL"
