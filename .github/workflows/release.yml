---
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── バージョンタグが既に存在するかチェック ──
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if version tag already exists
        id: check
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          TAG="v${VERSION}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "Tag $TAG does not exist — will release"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  # ── マルチプラットフォームビルド ──
  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin
            rust-target: aarch64-apple-darwin
            bundle-target: aarch64-apple-darwin
            artifact-name: mac-arm64
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust-targets: x86_64-apple-darwin
            rust-target: x86_64-apple-darwin
            bundle-target: x86_64-apple-darwin
            artifact-name: mac-x64
          - platform: windows-latest
            args: --target x86_64-pc-windows-msvc
            rust-targets: x86_64-pc-windows-msvc
            rust-target: x86_64-pc-windows-msvc
            bundle-target: x86_64-pc-windows-msvc
            artifact-name: win-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.26.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          pnpm build
          pnpm tauri build ${{ matrix.args }}

      - name: Ad-hoc sign macOS app and rebuild DMG
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail

          APP_ROOT="src-tauri/target/${{ matrix.rust-target }}/release/bundle"
          APP_DIR=$(find "$APP_ROOT/macos" -maxdepth 1 -name "*.app" -print -quit || true)
          if [ -z "$APP_DIR" ]; then
            echo "App bundle not found under: $APP_ROOT/macos" >&2
            find "$APP_ROOT" -maxdepth 3 -type f | head -200 || true
            exit 1
          fi

          echo "Using app bundle: $APP_DIR"
          codesign -s - --force --deep --timestamp=none "$APP_DIR"

          DMG_DIR="$APP_ROOT/dmg"
          mkdir -p "$DMG_DIR"
          DMG_PATH=$(find "$DMG_DIR" -maxdepth 1 -name "*.dmg" -print -quit || true)
          if [ -z "$DMG_PATH" ]; then
            APP_NAME=$(basename "$APP_DIR" .app)
            DMG_PATH="$DMG_DIR/${APP_NAME}.dmg"
          fi
          echo "DMG output path: $DMG_PATH"
          rm -f "$DMG_PATH"

          STAGE=$(mktemp -d)
          trap 'rm -rf "$STAGE"' EXIT
          cp -R "$APP_DIR" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"

          hdiutil create -volname "MC-Vector" -srcfolder "$STAGE" -ov -format UDZO "$DMG_PATH" || {
            echo "hdiutil create failed for target ${{ matrix.rust-target }}" >&2
            ls -la "$DMG_DIR" || true
            exit 1
          }

      - name: Verify macOS app signature and architecture
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail

          APP_ROOT="src-tauri/target/${{ matrix.rust-target }}/release/bundle/macos"
          APP_DIR=$(find "$APP_ROOT" -maxdepth 1 -name "*.app" -print -quit || true)
          if [ -z "$APP_DIR" ]; then
            echo "App bundle not found under: $APP_ROOT" >&2
            exit 1
          fi

          BIN_DIR="$APP_DIR/Contents/MacOS"
          BIN_FILE=$(find "$BIN_DIR" -maxdepth 1 -type f -perm -111 -print -quit)

          echo "--- App Bundle: $APP_DIR ---"
          echo "--- Binary: $BIN_FILE ---"

          if [ -z "$BIN_FILE" ]; then
            echo "Executable not found" >&2
            exit 1
          fi

          echo "=== Architecture ==="
          lipo -info "$BIN_FILE"

          echo "=== Code Signature Verification ==="
          codesign --verify --deep --verbose=2 "$APP_DIR" || true

          echo "=== Gatekeeper Assessment ==="
          spctl --assess --type execute --verbose=4 "$APP_DIR" || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            src-tauri/target/${{ matrix.bundle-target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.bundle-target }}/release/bundle/**/*.app.tar.gz
            src-tauri/target/${{ matrix.bundle-target }}/release/bundle/**/*.app.tar.gz.sig
            src-tauri/target/${{ matrix.bundle-target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.bundle-target }}/release/bundle/**/*.nsis.zip
            src-tauri/target/${{ matrix.bundle-target }}/release/bundle/**/*.nsis.zip.sig
            src-tauri/target/${{ matrix.bundle-target }}/release/bundle/**/*.zip
            src-tauri/target/${{ matrix.bundle-target }}/release/bundle/**/*.zip.sig
          retention-days: 5

  # ── リリース作成 + gh-pages デプロイ ──
  release:
    needs: [check-version, build]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Collect and normalize release artifacts
        run: |
          set -euo pipefail
          VERSION="${{ needs.check-version.outputs.version }}"
          mkdir -p release-assets gh-pages-deploy

          require_file() {
            local file_path="$1"
            local label="$2"
            if [ -z "$file_path" ] || [ ! -f "$file_path" ]; then
              echo "Missing required artifact: $label" >&2
              exit 1
            fi
          }

          MAC_ARM64_APP=$(find artifacts/mac-arm64 -type f -name '*.app.tar.gz' ! -name '*.sig' | head -1 || true)
          MAC_ARM64_SIG=$(find artifacts/mac-arm64 -type f -name '*.app.tar.gz.sig' | head -1 || true)
          MAC_X64_APP=$(find artifacts/mac-x64 -type f -name '*.app.tar.gz' ! -name '*.sig' | head -1 || true)
          MAC_X64_SIG=$(find artifacts/mac-x64 -type f -name '*.app.tar.gz.sig' | head -1 || true)
          WIN_X64_ZIP=$(find artifacts/win-x64 -type f -name '*.nsis.zip' ! -name '*.sig' | head -1 || true)
          if [ -z "$WIN_X64_ZIP" ]; then
            WIN_X64_ZIP=$(find artifacts/win-x64 -type f -name '*.zip' ! -name '*.sig' | head -1 || true)
          fi
          WIN_X64_SIG=$(find artifacts/win-x64 -type f -name '*.nsis.zip.sig' | head -1 || true)
          if [ -z "$WIN_X64_SIG" ]; then
            WIN_X64_SIG=$(find artifacts/win-x64 -type f -name '*.zip.sig' | head -1 || true)
          fi

          require_file "$MAC_ARM64_APP" "macOS arm64 updater archive"
          require_file "$MAC_ARM64_SIG" "macOS arm64 updater signature"
          require_file "$MAC_X64_APP" "macOS x64 updater archive"
          require_file "$MAC_X64_SIG" "macOS x64 updater signature"

          MAC_ARM64_OUT="MC-Vector_${VERSION}_darwin-aarch64.app.tar.gz"
          MAC_X64_OUT="MC-Vector_${VERSION}_darwin-x86_64.app.tar.gz"

          cp "$MAC_ARM64_APP" "release-assets/${MAC_ARM64_OUT}"
          cp "$MAC_ARM64_SIG" "release-assets/${MAC_ARM64_OUT}.sig"
          cp "$MAC_X64_APP" "release-assets/${MAC_X64_OUT}"
          cp "$MAC_X64_SIG" "release-assets/${MAC_X64_OUT}.sig"

          HAS_WINDOWS_UPDATER="false"
          WIN_X64_OUT="MC-Vector_${VERSION}_windows-x86_64.nsis.zip"
          if [ -n "$WIN_X64_ZIP" ] && [ -f "$WIN_X64_ZIP" ] && [ -n "$WIN_X64_SIG" ] && [ -f "$WIN_X64_SIG" ]; then
            cp "$WIN_X64_ZIP" "release-assets/${WIN_X64_OUT}"
            cp "$WIN_X64_SIG" "release-assets/${WIN_X64_OUT}.sig"
            HAS_WINDOWS_UPDATER="true"
            echo "Windows updater artifacts detected and normalized."
          else
            echo "Windows updater archive/signature not found. Proceeding without windows updater metadata."
          fi

          echo "HAS_WINDOWS_UPDATER=${HAS_WINDOWS_UPDATER}" >> "$GITHUB_ENV"
          echo "WIN_X64_OUT=${WIN_X64_OUT}" >> "$GITHUB_ENV"

          find artifacts -type f -name '*.dmg' -exec cp {} release-assets/ \;
          find artifacts/win-x64 -type f -name '*.exe' -exec cp {} release-assets/ \;

          echo "=== Files to be released ==="
          ls -lh release-assets/

      - name: Generate latest.json for updater
        run: |
          set -euo pipefail
          VERSION="${{ needs.check-version.outputs.version }}"
          TAG="v${VERSION}"
          BASE_URL="https://github.com/tukuyomil032/MC-Vector/releases/download/${TAG}"

          MAC_ARM64_FILE="MC-Vector_${VERSION}_darwin-aarch64.app.tar.gz"
          MAC_X64_FILE="MC-Vector_${VERSION}_darwin-x86_64.app.tar.gz"

          for required in \
            "$MAC_ARM64_FILE" \
            "$MAC_ARM64_FILE.sig" \
            "$MAC_X64_FILE" \
            "$MAC_X64_FILE.sig"; do
            if [ ! -f "release-assets/$required" ]; then
              echo "Missing normalized release asset: $required" >&2
              exit 1
            fi
          done

          MAC_ARM64_SIG=$(tr -d '\r\n' < "release-assets/${MAC_ARM64_FILE}.sig")
          MAC_X64_SIG=$(tr -d '\r\n' < "release-assets/${MAC_X64_FILE}.sig")

          jq -n \
            --arg version "$VERSION" \
            --arg notes "MC-Vector ${TAG}" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg mac_arm64_sig "$MAC_ARM64_SIG" \
            --arg mac_x64_sig "$MAC_X64_SIG" \
            --arg base_url "$BASE_URL" \
            --arg mac_arm64_file "$MAC_ARM64_FILE" \
            --arg mac_x64_file "$MAC_X64_FILE" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": {
                  signature: $mac_arm64_sig,
                  url: ($base_url + "/" + $mac_arm64_file)
                },
                "darwin-x86_64": {
                  signature: $mac_x64_sig,
                  url: ($base_url + "/" + $mac_x64_file)
                }
              }
            }' > gh-pages-deploy/latest.json

          if [ "${HAS_WINDOWS_UPDATER:-false}" = "true" ]; then
            WIN_X64_FILE="${WIN_X64_OUT:-MC-Vector_${VERSION}_windows-x86_64.nsis.zip}"
            if [ -f "release-assets/${WIN_X64_FILE}.sig" ] && [ -f "release-assets/${WIN_X64_FILE}" ]; then
              WIN_X64_SIG=$(tr -d '\r\n' < "release-assets/${WIN_X64_FILE}.sig")
              jq \
                --arg win_x64_sig "$WIN_X64_SIG" \
                --arg base_url "$BASE_URL" \
                --arg win_x64_file "$WIN_X64_FILE" \
                '.platforms["windows-x86_64"] = {
                  "signature": $win_x64_sig,
                  "url": ($base_url + "/" + $win_x64_file)
                }' \
                gh-pages-deploy/latest.json > gh-pages-deploy/latest-with-win.json
              mv gh-pages-deploy/latest-with-win.json gh-pages-deploy/latest.json
            else
              echo "HAS_WINDOWS_UPDATER=true but normalized windows files are missing. Skipping windows metadata."
            fi
          fi

          echo "Generated latest.json:"
          cat gh-pages-deploy/latest.json

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-deploy
          publish_branch: gh-pages
          keep_files: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: MC-Vector v${{ needs.check-version.outputs.version }}
          draft: false
          prerelease: false
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
